<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Tipo Transporte - Sistema Darwin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚛 Gestión de Tipos de Transporte</h1>
            <p>Crear nuevo tipo de transporte en el sistema</p>
        </div>
        <div class="nav">
            <a href="/">🏠 Inicio</a>
            <a href="/acciones">📌 Acciones</a>
            <a href="/accion_especifica">🎯 Acciones Específicas</a>
            <a href="/subaccion">🔽 Subacciones</a>
            <a href="/actividad">⚡ Actividades</a>
            <a href="/tipo_agente">👤 Tipos de Agente</a>
            <a href="/tipo_transporte">🚛 Transporte</a>
            <a href="/zona_provincia">🗺️ Provincias</a>
            <a href="/zona_distrito">🏘️ Distritos</a>
            <a href="/registro">📋 Registros</a>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    ➕ Nuevo Tipo de Transporte
                </div>
                
                <div class="form-container">
                    <form method="POST" action="/tipo_transporte">
                        <div class="form-group">
                            <label>Nombre Transporte:</label>
                            <input type="text" name="NOMBRE_TRANSPORTE" placeholder="Ej: Camión, Furgoneta, Trailer" required />
                        </div>
                        
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-success">💾 Guardar Tipo</button>
                            <a href="/tipo_transporte" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
