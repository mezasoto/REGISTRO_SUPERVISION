<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Registro - Sistema Darwin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Gestión de Registros</h1>
            <p>Crear nuevo registro en el sistema</p>
        </div>
        <div class="nav">
            <a href="/">🏠 Inicio</a>
            <a href="/acciones">📌 Acciones</a>
            <a href="/accion_especifica">🎯 Acciones Específicas</a>
            <a href="/subaccion">🔽 Subacciones</a>
            <a href="/actividad">⚡ Actividades</a>
            <a href="/tipo_agente">👤 Tipos de Agente</a>
            <a href="/tipo_transporte">🚛 Transporte</a>
            <a href="/zona_provincia">🗺️ Provincias</a>
            <a href="/zona_distrito">🏘️ Distritos</a>
            <a href="/registro">📋 Registros</a>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    ➕ Nuevo Registro
                </div>
                
                <div class="form-container">
                    <form method="POST" action="/registro">
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Acción:</label>
                                <select name="ID_ACCION">
                                    <option value="">-- Seleccionar Acción --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Acción Específica:</label>
                                <select name="ID_AE">
                                    <option value="">-- Seleccionar --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Subacción:</label>
                                <select name="ID_SA">
                                    <option value="">-- Seleccionar --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Actividad:</label>
                                <select name="ID_ACTIVIDAD">
                                    <option value="">-- Seleccionar --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Tipo Transporte:</label>
                                <select name="id_tt">
                                    <option value="">-- Seleccionar --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Distrito:</label>
                                <select name="id_zd">
                                    <option value="">-- Seleccionar --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Provincia:</label>
                                <select name="id_zp">
                                    <option value="">-- Seleccionar --</option>
                                    <!-- Opciones insertadas por Node.js -->
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>N° Supervisores:</label>
                                <input type="number" name="NUM_SUPERVISORES" placeholder="Cantidad de supervisores" />
                            </div>
                            
                            <div class="form-group">
                                <label>Empresa Supervisora:</label>
                                <input type="text" name="EMPRESA_SUPERVISORA" placeholder="Nombre de la empresa" />
                            </div>
                            
                            <div class="form-group">
                                <label>Calidad Entregable:</label>
                                <input type="text" name="CALIDAD_ENTREGABLE" placeholder="Calidad del entregable" />
                            </div>
                            
                            <div class="form-group">
                                <label>N° Expediente:</label>
                                <input type="text" name="NRO_EXPEDIENTE" placeholder="Número de expediente" />
                            </div>
                            
                            <div class="form-group">
                                <label>Carta Línea:</label>
                                <input type="text" name="CARTA_LINEA" placeholder="Carta línea" />
                            </div>
                            
                            <div class="form-group">
                                <label>Contrato:</label>
                                <input type="text" name="CONTRATO" placeholder="Número de contrato" />
                            </div>
                            
                            <div class="form-group">
                                <label>Observaciones:</label>
                                <textarea name="OBSERVACIONES" placeholder="Observaciones adicionales"></textarea>
                            </div>
                        </div>
                        
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-success">💾 Guardar Registro</button>
                            <a href="/registro" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
