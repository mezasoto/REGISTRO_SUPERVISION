<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Distrito - Sistema Darwin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏘️ Gestión de Distritos</h1>
            <p>Crear nuevo distrito en el sistema</p>
        </div>
        <div class="nav">
            <a href="/">🏠 Inicio</a>
            <a href="/acciones">📌 Acciones</a>
            <a href="/accion_especifica">🎯 Acciones Específicas</a>
            <a href="/subaccion">🔽 Subacciones</a>
            <a href="/actividad">⚡ Actividades</a>
            <a href="/tipo_agente">👤 Tipos de Agente</a>
            <a href="/tipo_transporte">🚛 Transporte</a>
            <a href="/zona_provincia">🗺️ Provincias</a>
            <a href="/zona_distrito">🏘️ Distritos</a>
            <a href="/registro">📋 Registros</a>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    ➕ Nuevo Distrito
                </div>
                
                <div class="form-container">
                    <form method="POST" action="/zona_distrito">
                        <div class="form-group">
                            <label>Nombre Distrito:</label>
                            <input type="text" name="NOMBRE_DISTRITO" placeholder="Ej: Miraflores, San Isidro" required />
                        </div>
                        
                        <div class="form-group">
                            <label>Provincia:</label>
                            <select name="id_zp" required>
                                <option value="">-- Seleccionar Provincia --</option>
                                <!-- Opciones insertadas por Node.js -->
                            </select>
                        </div>
                        
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-success">💾 Guardar Distrito</button>
                            <a href="/zona_distrito" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
