<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Actividad - Sistema Darwin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Gestión de Actividades</h1>
            <p>Crear nueva actividad en el sistema</p>
        </div>
        <div class="nav">
            <a href="/">🏠 Inicio</a>
            <a href="/acciones">📌 Acciones</a>
            <a href="/accion_especifica">🎯 Acciones Específicas</a>
            <a href="/subaccion">🔽 Subacciones</a>
            <a href="/actividad">⚡ Actividades</a>
            <a href="/tipo_agente">👤 Tipos de Agente</a>
            <a href="/tipo_transporte">🚛 Transporte</a>
            <a href="/zona_provincia">🗺️ Provincias</a>
            <a href="/zona_distrito">🏘️ Distritos</a>
            <a href="/registro">📋 Registros</a>
        </div>
        <div class="content">
            <div class="card">
                <div class="card-header">
                    ➕ Nueva Actividad
                </div>
                
                <div class="form-container">
                    <form method="POST" action="/actividad">
                        <div class="form-group">
                            <label>Nombre Actividad:</label>
                            <input type="text" name="NOMBRE_ACTIVIDAD" placeholder="Nombre de la actividad" required />
                        </div>
                        
                        <div class="form-group">
                            <label>Código Actividad:</label>
                            <input type="text" name="CODIGO_ACTIVIDAD" placeholder="Código identificador" />
                        </div>
                        
                        <div class="form-group">
                            <label>Tipo de Agente:</label>
                            <select name="ID_TA">
                                <option value="">-- Seleccionar Tipo de Agente --</option>
                                <!-- Opciones insertadas por Node.js -->
                            </select>
                        </div>
                        
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-success">💾 Guardar Actividad</button>
                            <a href="/actividad" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
